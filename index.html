<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR เก็บขยะ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Kanit','Sarabun',sans-serif; }
#app { position:relative; width:100vw; height:100vh; }
#video {
  position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1); z-index:0;
}
#gameCanvas {
  position:absolute; top:0; left:0; width:100%; height:100%; z-index:2;
}
#hud {
  position:absolute; top:0; left:0; width:100%; z-index:10;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:14px 16px; pointer-events:none;
}
.panel {
  background:rgba(0,0,0,0.65); backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,0.18); border-radius:14px;
  padding:8px 18px; color:#fff; text-align:center; min-width:80px;
}
.panel .lbl { font-size:12px; opacity:0.65; letter-spacing:1px; }
.panel .val { font-size:30px; font-weight:800; line-height:1.1; }
#progWrap {
  position:absolute; top:76px; left:50%; transform:translateX(-50%);
  z-index:10; width:min(360px,82vw); pointer-events:none;
}
.pbar { height:9px; background:rgba(255,255,255,0.14); border-radius:8px; overflow:hidden; }
.pfill { height:100%; border-radius:8px; background:linear-gradient(90deg,#00e676,#00bcd4); transition:width .35s; }
.plbl { color:rgba(255,255,255,0.45); font-size:11px; text-align:right; margin-top:3px; }
.score-pop {
  position:absolute; font-size:30px; font-weight:800; pointer-events:none;
  z-index:15; animation:popUp .9s ease-out forwards; text-shadow:0 2px 8px rgba(0,0,0,.9);
}
@keyframes popUp {
  0%   { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-90px) scale(1.4); opacity:0; }
}
/* Screens */
.screen {
  position:absolute; inset:0; z-index:20;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#startScreen { background:linear-gradient(135deg,rgba(0,15,35,.93),rgba(0,35,15,.93)); backdrop-filter:blur(4px); }
#startScreen h1 { font-size:clamp(26px,5vw,50px); font-weight:800; color:#fff; text-shadow:0 0 40px rgba(80,255,130,.7); margin-bottom:8px; text-align:center; }
#startScreen p { color:rgba(255,255,255,.7); font-size:15px; margin-bottom:28px; text-align:center; line-height:1.7; }
#endScreen { background:rgba(0,0,0,.88); backdrop-filter:blur(8px); display:none; }
#endScreen h2 { font-size:38px; color:#fff; margin-bottom:8px; }
.big-score { font-size:82px; font-weight:800; color:#00e676; line-height:1; }
#endScreen p { color:rgba(255,255,255,.6); font-size:17px; margin:10px 0 26px; text-align:center; }
.btn {
  background:linear-gradient(135deg,#00e676,#00bcd4); border:none; border-radius:50px;
  padding:15px 46px; font-size:19px; font-weight:700; color:#000; cursor:pointer;
  box-shadow:0 0 28px rgba(0,230,118,.5); transition:transform .15s;
}
.btn:hover { transform:scale(1.06); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="panel"><div class="lbl">คะแนน</div><div class="val" id="scoreDisp">0</div></div>
    <div class="panel"><div class="lbl">เป้าหมาย</div><div class="val">40</div></div>
    <div class="panel"><div class="lbl">เวลา</div><div class="val" id="timerDisp">90</div></div>
  </div>
  <div id="progWrap">
    <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
    <div class="plbl" id="plbl">0 / 40</div>
  </div>

  <div id="startScreen" class="screen">
    <div style="font-size:62px;margin-bottom:14px">♻️</div>
    <h1>AR เก็บขยะ</h1>
    <p>ใช้มือหยิบขยะที่หล่นลงมา<br>โยนใส่ถังให้ถูกประเภท<br>ทำคะแนนให้ครบ <strong>40 คะแนน</strong>!</p>
    <button class="btn" id="btnStart">🎮 เริ่มเกม</button>
    <div style="margin-top:18px;color:rgba(255,255,255,.35);font-size:12px">ใช้กล้อง AR • นิ้วมือ Pinch หยิบขยะ</div>
  </div>
  <div id="endScreen" class="screen">
    <div style="font-size:54px">🏆</div>
    <h2>จบเกม!</h2>
    <div class="big-score" id="finalScore">0</div>
    <p id="resultTxt"></p>
    <button class="btn" id="btnRestart">🔄 เล่นอีกครั้ง</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const TOTAL  = 40;
const PBIN   = 10;
const GTIME  = 90;

const BINS = [
  { type:'wet', label:'เปียก',    emoji:'💧', colors:['#1565C0','#1976D2','#42A5F5'], lid:'#0D47A1' },
  { type:'dry', label:'แห้ง',    emoji:'🌿', colors:['#2E7D32','#388E3C','#66BB6A'], lid:'#1B5E20' },
  { type:'haz', label:'อันตราย', emoji:'⚠️', colors:['#BF360C','#D84315','#FF7043'], lid:'#870000' },
  { type:'rec', label:'รีไซเคิล',emoji:'♻️', colors:['#F57F17','#F9A825','#FFEE58'], lid:'#E65100' },
];

const TRASH = [
  { e:'🍌', l:'กล้วย',       t:'wet', c:'#FFD600' },
  { e:'🍎', l:'แอปเปิ้ล',   t:'wet', c:'#E53935' },
  { e:'🍖', l:'กระดูก',     t:'wet', c:'#BCAAA4' },
  { e:'🥬', l:'ผัก',        t:'wet', c:'#43A047' },
  { e:'🍚', l:'ข้าวเหลือ',  t:'wet', c:'#FFF9C4' },
  { e:'📄', l:'กระดาษ',     t:'dry', c:'#90CAF9' },
  { e:'🧻', l:'ทิชชู่',     t:'dry', c:'#EEEEEE' },
  { e:'👕', l:'เสื้อผ้า',   t:'dry', c:'#CE93D8' },
  { e:'🪵', l:'ไม้',        t:'dry', c:'#A1887F' },
  { e:'🧦', l:'ถุงเท้า',    t:'dry', c:'#80CBC4' },
  { e:'🔋', l:'ถ่าน',       t:'haz', c:'#FFCA28' },
  { e:'💊', l:'ยา',         t:'haz', c:'#EF9A9A' },
  { e:'🧴', l:'สารเคมี',    t:'haz', c:'#80DEEA' },
  { e:'💡', l:'หลอดไฟ',     t:'haz', c:'#FFF59D' },
  { e:'🩺', l:'เข็มฉีดยา',  t:'haz', c:'#B0BEC5' },
  { e:'🥤', l:'ขวดพลาสติก', t:'rec', c:'#4FC3F7' },
  { e:'🫙', l:'กระป๋อง',    t:'rec', c:'#CFD8DC' },
  { e:'📦', l:'กล่อง',      t:'rec', c:'#FFCC80' },
  { e:'🍾', l:'ขวดแก้ว',    t:'rec', c:'#A5D6A7' },
  { e:'📰', l:'หนังสือพิมพ์',t:'rec', c:'#E0E0E0' },
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let W=0, H=0;
let score=0, binSc={wet:0,dry:0,haz:0,rec:0};
let running=false, timeLeft=GTIME;
let items=[], idxCnt=0, held=null, lastPinch=false;
let timerIv=null, spawnIv=null;
let hand={x:-1,y:-1,pinch:false};
let animId=null;

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const video  = document.getElementById('video');

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ══════════════════════════════════════════
//  BIN GEOMETRY
// ══════════════════════════════════════════
function getBinRects(){
  const bw = W/4, bh = Math.min(H*0.22, 160);
  return BINS.map((b,i)=>({
    ...b,
    x: i*bw, y: H-bh, w: bw, h: bh,
    cx: i*bw + bw/2
  }));
}

// ══════════════════════════════════════════
//  DRAW BINS — realistic 3D trash cans
// ══════════════════════════════════════════
function drawBins(){
  const rects = getBinRects();
  rects.forEach(b=>{
    const {x,y,w,h,colors,lid,emoji,label,type} = b;
    const cx = x+w/2;
    const bx = x+w*0.12, bw2 = w*0.76;
    const tx = x+w*0.08, tw  = w*0.84;
    const lidH = h*0.10;
    const bodyH = h*0.76;
    const bodyY = y+lidH+h*0.04;
    const bottomW = bw2*0.82;
    const bottomX = cx - bottomW/2;

    // ── shadow
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=18; ctx.shadowOffsetY=6;

    // ── body trapezoid
    const bodyGrad = ctx.createLinearGradient(x,0,x+w,0);
    bodyGrad.addColorStop(0, colors[0]);
    bodyGrad.addColorStop(0.4, colors[1]);
    bodyGrad.addColorStop(1, colors[2]);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(tx, bodyY);
    ctx.lineTo(tx+tw, bodyY);
    ctx.lineTo(bottomX+bottomW, bodyY+bodyH);
    ctx.lineTo(bottomX, bodyY+bodyH);
    ctx.closePath();
    ctx.fill();

    // body sheen (left highlight)
    const sheen = ctx.createLinearGradient(x,0,x+w*0.5,0);
    sheen.addColorStop(0,'rgba(255,255,255,0.22)');
    sheen.addColorStop(0.35,'rgba(255,255,255,0.0)');
    ctx.fillStyle=sheen;
    ctx.beginPath();
    ctx.moveTo(tx, bodyY);
    ctx.lineTo(tx+tw*0.42, bodyY);
    ctx.lineTo(bottomX+bottomW*0.42, bodyY+bodyH);
    ctx.lineTo(bottomX, bodyY+bodyH);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur=0; ctx.shadowOffsetY=0;

    // ── horizontal ridges
    ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2;
    for(let r=1;r<=3;r++){
      const ry = bodyY + bodyH*(r/4);
      const rProgress = r/4;
      const lx = tx + (bottomX-tx)*rProgress;
      const rx2= tx+tw + (bottomX+bottomW - (tx+tw))*rProgress;
      ctx.beginPath(); ctx.moveTo(lx+4,ry); ctx.lineTo(rx2-4,ry); ctx.stroke();
    }

    // ── bottom base
    ctx.fillStyle=colors[0];
    ctx.beginPath();
    ctx.roundRect(bottomX, bodyY+bodyH-4, bottomW, 10, 4);
    ctx.fill();

    // ── LID
    const lidGrad = ctx.createLinearGradient(x,y,x+w,y+lidH+8);
    lidGrad.addColorStop(0, lighten(lid,30));
    lidGrad.addColorStop(1, lid);
    ctx.fillStyle=lidGrad;
    ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
    ctx.beginPath();
    ctx.roundRect(bx, y, bw2, lidH+6, [8,8,4,4]);
    ctx.fill();
    ctx.shadowBlur=0; ctx.shadowOffsetY=0;

    // lid shine
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.roundRect(bx+6, y+3, bw2-12, lidH*0.5, 4);
    ctx.fill();

    // lid handle
    ctx.fillStyle=lighten(lid,50);
    ctx.beginPath();
    ctx.roundRect(cx-14, y-6, 28, 10, 5);
    ctx.fill();
    ctx.strokeStyle=lid; ctx.lineWidth=1.5;
    ctx.stroke();

    // ── emoji large
    ctx.font = `${Math.min(w,h)*0.30}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=8;
    ctx.fillText(emoji, cx, bodyY+bodyH*0.42);
    ctx.shadowBlur=0;

    // ── label
    ctx.fillStyle='#fff';
    ctx.font=`700 ${Math.max(11,w*0.115)}px Kanit,sans-serif`;
    ctx.fillText(label, cx, bodyY+bodyH*0.78);

    // ── score badge on lid
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.roundRect(cx-22,y+2,44,lidH+2,6); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font=`700 ${Math.max(10,w*0.1)}px Kanit,sans-serif`;
    ctx.fillText(`${binSc[type]}/${PBIN}`, cx, y+lidH*0.7+2);

    // divider
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x+w,y); ctx.lineTo(x+w,H); ctx.stroke();

    ctx.restore();
  });
}

function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16)+amt, g=parseInt(hex.slice(3,5),16)+amt, b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
//  TRASH ITEM
// ══════════════════════════════════════════
function mkTrash(){
  const d = TRASH[Math.floor(Math.random()*TRASH.length)];
  const sz = Math.min(W,H)*0.10 + 22; // 80–110px
  return {
    id: idxCnt++,
    ...d,
    x: sz + Math.random()*(W-sz*2),
    y: -sz*1.2,
    vy: 1.2 + Math.random()*1.2,
    sz,
    held:false, dead:false,
    phase: Math.random()*Math.PI*2
  };
}

function drawTrash(t){
  const s = t.sz;
  const pulse = Math.sin(Date.now()/500 + t.phase)*0.035;
  const sc = t.held ? 1.22+pulse : 1.0+pulse*0.4;
  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.scale(sc, sc);

  if(t.held){ ctx.shadowColor=t.c; ctx.shadowBlur=32; }

  // circle bg
  const g2 = ctx.createRadialGradient(-s*.15,-s*.15,0,0,0,s*.6);
  g2.addColorStop(0, lighten(t.c,55));
  g2.addColorStop(1, t.c+'bb');
  ctx.fillStyle=g2;
  ctx.beginPath(); ctx.arc(0,0,s*.58,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2.5;
  ctx.stroke();

  ctx.shadowBlur=0;

  // emoji
  ctx.font=`${s*.56}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t.e, 0, 3);

  // label
  ctx.fillStyle='rgba(0,0,0,0.6)';
  const lw=s*.95, lh=19;
  ctx.beginPath(); ctx.roundRect(-lw/2, s*.5, lw, lh, 6); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font=`600 ${Math.max(10,s*.17)}px Kanit,sans-serif`;
  ctx.fillText(t.l, 0, s*.5+lh/2+1);

  ctx.restore();
}

// ══════════════════════════════════════════
//  GHOST HAND — full finger skeleton AR overlay
// ══════════════════════════════════════════
const FINGER_BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20]
];
const PALM_IDX = [0,5,9,13,17,0];
let lastLM = null; // store latest landmarks

function drawGhostHand(lm){
  if(!lm || lm.length===0) return;
  const pinching = hand.pinch;
  ctx.save();

  // palm ghost fill
  ctx.beginPath();
  PALM_IDX.forEach((i,n)=>{
    const px=(1-lm[i].x)*W, py=lm[i].y*H;
    n===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  });
  ctx.closePath();
  ctx.fillStyle = pinching ? 'rgba(0,230,118,0.10)' : 'rgba(180,220,255,0.08)';
  ctx.fill();

  // bones
  FINGER_BONES.forEach(([a,b])=>{
    const ax=(1-lm[a].x)*W, ay=lm[a].y*H;
    const bx=(1-lm[b].x)*W, by=lm[b].y*H;
    // glow
    ctx.strokeStyle = pinching ? 'rgba(0,230,118,0.5)' : 'rgba(120,200,255,0.4)';
    ctx.lineWidth=5; ctx.lineCap='round';
    ctx.shadowColor = pinching ? '#00e676' : '#80c8ff'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    // bright core
    ctx.strokeStyle = pinching ? 'rgba(0,255,150,0.95)' : 'rgba(200,235,255,0.80)';
    ctx.lineWidth=2; ctx.shadowBlur=3;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
  });
  ctx.shadowBlur=0;

  // joints
  lm.forEach((p,i)=>{
    const px=(1-p.x)*W, py=p.y*H;
    const isThumb = (i===4), isIndex = (i===8);
    const r = (isThumb||isIndex) ? 10 : (i===0 ? 8 : 5);
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    if(isIndex){ ctx.fillStyle='#00cfff'; ctx.shadowColor='#00cfff'; ctx.shadowBlur=20; }
    else if(isThumb){ ctx.fillStyle='#ff9100'; ctx.shadowColor='#ff9100'; ctx.shadowBlur=20; }
    else { ctx.fillStyle = pinching ? 'rgba(0,210,100,0.85)' : 'rgba(160,220,255,0.75)'; ctx.shadowBlur=6; ctx.shadowColor='#80cfff'; }
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5; ctx.shadowBlur=0; ctx.stroke();
  });

  // fingertip labels
  const ix8=(1-lm[8].x)*W, iy8=lm[8].y*H;
  const tx4=(1-lm[4].x)*W, ty4=lm[4].y*H;

  // index label
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(ix8+13,iy8-16,56,22,6); ctx.fill();
  ctx.fillStyle='#00cfff'; ctx.font='bold 12px Kanit,sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('นิ้วชี้', ix8+18, iy8-5);

  // thumb label
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(tx4+13,ty4-16,64,22,6); ctx.fill();
  ctx.fillStyle='#ff9100'; ctx.font='bold 12px Kanit,sans-serif';
  ctx.fillText('นิ้วโป้ง', tx4+18, ty4-5);

  // pinch spark
  if(pinching){
    const mx=(ix8+tx4)/2, my=(iy8+ty4)/2;
    ctx.strokeStyle='rgba(0,255,130,0.9)'; ctx.lineWidth=3;
    ctx.shadowColor='#00e676'; ctx.shadowBlur=22;
    ctx.setLineDash([7,5]);
    ctx.beginPath(); ctx.moveTo(ix8,iy8); ctx.lineTo(tx4,ty4); ctx.stroke();
    ctx.setLineDash([]);
    // spark burst
    ctx.beginPath(); ctx.arc(mx,my,16,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,130,0.22)'; ctx.shadowBlur=35; ctx.fill();
    ctx.strokeStyle='#00e676'; ctx.lineWidth=2.5; ctx.shadowBlur=20; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#00e676'; ctx.font='bold 14px Kanit,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PINCH ✊', mx, my-30);
  }
  ctx.restore();
}

// ══════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════
function loop(){
  if(!running){ animId=null; return; }
  ctx.clearRect(0,0,W,H);
  drawBins();

  const bins = getBinRects();

  items.forEach(t=>{
    if(t.dead) return;
    if(!t.held){
      t.y += t.vy;
      if(t.y > H+t.sz){ t.dead=true; return; }
    } else {
      t.x += (hand.x - t.x)*0.3;
      t.y += (hand.y - t.y)*0.3;
    }
    drawTrash(t);

    // release detection
    if(t.held && lastPinch && !hand.pinch){
      let dropped=false;
      bins.forEach(b=>{
        if(!dropped && t.x>b.x && t.x<b.x+b.w && t.y>b.y-20){
          dropped=true;
          if(b.type===t.t && binSc[b.type]<PBIN){
            binSc[b.type]++; score++;
            pop(t.x,t.y,'+1','#00e676');
            updateHUD();
          } else {
            pop(t.x,t.y,'✗','#ff5252');
          }
          t.dead=true; held=null;
        }
      });
      if(!dropped){ t.held=false; held=null; }
    }
  });

  items = items.filter(t=>!t.dead);
  drawGhostHand(lastLM);
  lastPinch = hand.pinch;

  if(score>=TOTAL){ endGame(true); return; }
  animId = requestAnimationFrame(loop);
}

// ══════════════════════════════════════════
//  SPAWN
// ══════════════════════════════════════════
function spawn(){
  if(!running) return;
  if(items.length < 7){
    items.push(mkTrash());
  }
}

// ══════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════
function updateHUD(){
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('pfill').style.width = (score/TOTAL*100)+'%';
  document.getElementById('plbl').textContent = `${score} / ${TOTAL}`;
}

// ══════════════════════════════════════════
//  POPUP
// ══════════════════════════════════════════
function pop(x,y,txt,col){
  const el=document.createElement('div');
  el.className='score-pop'; el.textContent=txt;
  el.style.cssText=`left:${x}px;top:${y}px;color:${col};`;
  document.getElementById('app').appendChild(el);
  setTimeout(()=>el.remove(),950);
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer(){
  timeLeft=GTIME;
  document.getElementById('timerDisp').textContent=timeLeft;
  timerIv=setInterval(()=>{
    timeLeft--;
    document.getElementById('timerDisp').textContent=timeLeft;
    if(timeLeft<=0) endGame(false);
  },1000);
}

// ══════════════════════════════════════════
//  START / END
// ══════════════════════════════════════════
function startGame(){
  score=0; binSc={wet:0,dry:0,haz:0,rec:0};
  items=[]; held=null; lastPinch=false;
  updateHUD();
  running=true;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  clearInterval(timerIv); clearInterval(spawnIv);
  startTimer();
  spawn(); spawn(); spawn();
  spawnIv=setInterval(spawn, 1600);
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function endGame(win){
  running=false;
  clearInterval(timerIv); clearInterval(spawnIv);
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  document.getElementById('finalScore').textContent=score;
  document.getElementById('resultTxt').textContent =
    win?'🎉 ยอดเยี่ยม! เต็ม 40 คะแนน!':
    score>=30?'👍 เก่งมาก! ลองอีกครั้ง':
    score>=20?'😊 ดีมาก! ฝึกอีกหน่อยนะ':'💪 สู้ต่อ! ลองอีกครั้ง';
  document.getElementById('endScreen').style.display='flex';
}

document.getElementById('btnStart').onclick  = startGame;
document.getElementById('btnRestart').onclick = startGame;

// ══════════════════════════════════════════
//  HAND TRACKING (MediaPipe)
// ══════════════════════════════════════════
function onHands(res){
  if(!running || !res.multiHandLandmarks?.length){
    hand.pinch=false; hand.x=hand.y=-1; lastLM=null; return;
  }
  const lm = res.multiHandLandmarks[0];
  lastLM = lm;

  // index tip [8], thumb tip [4] — mirrored X
  const ix=(1-lm[8].x)*W, iy=lm[8].y*H;
  const tx=(1-lm[4].x)*W, ty=lm[4].y*H;

  // midpoint between fingertips = grab point
  hand.x=(ix+tx)/2; hand.y=(iy+ty)/2;
  hand.pinch = Math.hypot(ix-tx,iy-ty) < W*0.075;

  if(hand.pinch && !held){
    for(const t of items){
      if(t.dead||t.held) continue;
      // grab if midpoint near item, OR either fingertip near item
      const dMid = Math.hypot(t.x-hand.x, t.y-hand.y);
      const dIdx = Math.hypot(t.x-ix, t.y-iy);
      const dThm = Math.hypot(t.x-tx, t.y-ty);
      if(dMid < t.sz*0.75 || dIdx < t.sz*0.75 || dThm < t.sz*0.75){
        t.held=true; held=t; break;
      }
    }
  }
}

async function initCam(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720}});
    video.srcObject=stream;

    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6});
    hands.onResults(onHands);

    const cam=new Camera(video,{
      onFrame:async()=>{ await hands.send({image:video}); },
      width:1280,height:720
    });
    cam.start();
  } catch(e){
    console.warn('Camera error:',e);
    // Game still works with mouse/touch fallback
  }
}

// ══════════════════════════════════════════
//  MOUSE / TOUCH FALLBACK (no camera)
// ══════════════════════════════════════════
canvas.addEventListener('mousemove',e=>{
  if(!running) return;
  hand.x=e.clientX; hand.y=e.clientY;
  if(hand.pinch && !held){
    for(const t of items){
      if(t.dead||t.held) continue;
      if(Math.hypot(t.x-hand.x,t.y-hand.y)<t.sz*0.75){ t.held=true; held=t; break; }
    }
  }
});
canvas.addEventListener('mousedown',e=>{ hand.pinch=true; hand.x=e.clientX; hand.y=e.clientY; });
canvas.addEventListener('mouseup',  ()=>{ hand.pinch=false; });

canvas.addEventListener('touchmove',e=>{
  if(!running) return; e.preventDefault();
  hand.x=e.touches[0].clientX; hand.y=e.touches[0].clientY;
  if(hand.pinch && !held){
    for(const t of items){
      if(t.dead||t.held) continue;
      if(Math.hypot(t.x-hand.x,t.y-hand.y)<t.sz*0.75){ t.held=true; held=t; break; }
    }
  }
},{passive:false});
canvas.addEventListener('touchstart',e=>{ hand.pinch=true; hand.x=e.touches[0].clientX; hand.y=e.touches[0].clientY; });
canvas.addEventListener('touchend',  ()=>{ hand.pinch=false; });

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
initCam();
</script>
